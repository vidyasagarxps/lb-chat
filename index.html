<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Boarding Platform Analytics</title>
<style>
  :root{--bg:#f2f2f2;--s:#ffffff;--t:#333;--t2:#555;--m:#999;--b:#ddd;--a:#1b1e2b;--hdr:#141625;--accent:#2c3e6b;--green:#107c10;--red:#d13438;--thd:#e8e8e8;--tbd:#fafafa;--secbar:#2c3e6b}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);height:100vh;display:flex;flex-direction:column;color:var(--t)}

  .hdr{background:var(--hdr);padding:0 16px;display:flex;align-items:center;height:44px}
  .hdr-brand{display:flex;align-items:center;gap:10px}
  .hdr-logo{width:24px;height:24px;background:var(--accent);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff}
  .hdr-brand h1{font-size:13px;font-weight:600;color:#fff;white-space:nowrap}

  .chat{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:10px;background:var(--bg)}
  .chat::-webkit-scrollbar{width:4px}.chat::-webkit-scrollbar-track{background:var(--bg)}
  .chat::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}

  .msg{max-width:95%;animation:fi .2s ease}
  @keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .msg-u{align-self:flex-end}
  .msg-u .bbl{background:var(--accent);color:#fff;border-radius:8px 8px 2px 8px;padding:8px 14px;font-size:12.5px;line-height:1.5}
  .msg-b{align-self:flex-start}
  .msg-b .bbl{background:var(--s);border:1px solid var(--b);border-radius:8px 8px 8px 2px;padding:14px 16px;font-size:12.5px;line-height:1.6;box-shadow:0 1px 2px rgba(0,0,0,.05)}

  .bbl .sh{font-size:13.5px;font-weight:700;color:#fff;margin:14px 0 6px;padding:5px 8px;background:var(--secbar);border-radius:3px;letter-spacing:.2px}
  .bbl .sh:first-child{margin-top:0}
  .bbl .subh{font-size:12.5px;font-weight:700;color:var(--a);margin:10px 0 4px}
  .bbl p{margin:3px 0;color:var(--t);font-size:12.5px}.bbl strong{color:var(--a);font-weight:600}.bbl em{color:var(--t2)}
  .bbl code{background:var(--thd);padding:1px 4px;border-radius:2px;font-size:11px;font-family:'Consolas','Courier New',monospace;color:var(--accent)}
  .bbl ul{margin:4px 0 4px 4px;padding-left:14px}.bbl li{margin:2px 0;color:var(--t);font-size:12.5px}

  .tw{overflow-x:auto;margin:8px 0;border:1px solid var(--b);border-radius:2px;max-height:220px;overflow-y:auto;background:var(--s)}
  .tw table{width:100%;border-collapse:collapse;font-size:11.5px;min-width:max-content;table-layout:auto}
  .tw th{background:var(--thd);padding:6px 10px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.3px;color:var(--t2);border-bottom:1px solid var(--b);white-space:nowrap;position:sticky;top:0;z-index:1;min-width:70px}
  .tw td{padding:5px 10px;border-bottom:1px solid #eee;white-space:nowrap;color:var(--t);min-width:70px;font-size:11.5px}
  .tw tr:last-child td{border-bottom:none}
  .tw tr:hover td{background:#f5f7fa}
  .tw th.rn,.tw td.rn{text-align:right;font-variant-numeric:tabular-nums;font-family:'Consolas','Courier New',monospace}
  .tw td.rn{font-size:11px}
  .nl{color:var(--m)}.rc{font-size:9px;color:var(--m);text-align:right;margin-top:2px}

  .cb{margin:8px 0;border:1px solid var(--b);border-radius:2px;overflow:hidden;background:var(--s);min-height:60px}
  .cb .vega-embed{padding:8px}.cb .vega-embed details{display:none}

  .sql-row{display:flex;align-items:center;gap:5px;margin:5px 0 2px;flex-wrap:wrap}
  .sqt{cursor:pointer;color:var(--t2);font-size:10.5px;display:inline-flex;align-items:center;gap:3px;padding:2px 6px;background:var(--thd);border:1px solid var(--b);border-radius:2px;transition:all .15s}
  .sqt:hover{color:var(--accent);border-color:var(--accent)}
  .sqt .ar{transition:transform .2s;font-size:8px}.sqt .ar.op{transform:rotate(90deg)}
  .sqb{display:none;padding:8px 10px;background:var(--hdr);color:#c0c8d8;border-radius:2px;font-size:10.5px;font-family:'Consolas','Courier New',monospace;white-space:pre-wrap;word-break:break-all;margin:3px 0 6px;line-height:1.5;max-height:180px;overflow-y:auto}
  .sqb.v{display:block}

  .sb{background:var(--tbd);border-left:3px solid var(--secbar);padding:8px 12px;border-radius:0 2px 2px 0;margin:6px 0;font-size:12px;line-height:1.6;color:var(--t)}

  .vaq-badge{display:inline-flex;align-items:center;gap:2px;background:#dff6dd;color:var(--green);font-size:9.5px;padding:1px 6px;border-radius:2px;font-weight:600;border:1px solid #c8e6c9}

  .typ{align-self:flex-start;display:none}
  .typ .d{background:var(--s);padding:8px 14px;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.06);display:flex;gap:4px;border:1px solid var(--b)}
  .typ span{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:bn 1.4s infinite}
  .typ span:nth-child(2){animation-delay:.15s}.typ span:nth-child(3){animation-delay:.3s}
  @keyframes bn{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}

  .ib{background:var(--s);padding:8px 18px;border-top:1px solid var(--b);display:flex;gap:6px}
  .ib input{flex:1;padding:8px 12px;border:1px solid var(--b);border-radius:3px;font-size:12.5px;outline:none;background:var(--s);color:var(--t);font-family:inherit}
  .ib input::placeholder{color:var(--m)}
  .ib input:focus{border-color:var(--accent);box-shadow:0 0 0 1px rgba(44,62,107,.15)}
  .ib button{padding:8px 18px;background:var(--accent);color:#fff;border:none;border-radius:3px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
  .ib button:hover{background:#3a4f80}
  .ib button:disabled{background:var(--b);color:var(--m);cursor:not-allowed}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">LB</div>
    <h1>Loan Boarding Platform Analytics</h1>
  </div>
</div>
<div class="chat" id="chat">
  <div class="typ" id="typ"><div class="d"><span></span><span></span><span></span></div></div>
</div>
<div class="ib">
  <input type="text" id="inp" placeholder="Ask about loan boarding metrics..." onkeydown="if(event.key==='Enter')send()">
  <button id="btn" onclick="send()">Send</button>
</div>

<script>
var SF_URL="https://ARXPS-XPANSE.snowflakecomputing.com";
var AG_PATH="/api/v2/databases/XPS_AID/schemas/LOAN_BOARDING/agents/LB_PBI_AGENT:run";
var PAT='eyJraWQiOiI5MzcyNjA2OTQ3MzU5NTQiLCJhbGciOiJFUzI1NiJ9.eyJwIjoiMTQzMDE0NjUwMTM6MTQzMDE0NjY3NTciLCJpc3MiOiJTRjoxMDQzIiwiZXhwIjoxNzgxMTE4MjQ3fQ.JbOjs_9FuHuB7AfTbAgtcQAgx_tAfm5JYI2UvF-X0ggKcBC0Hi3F12eS-wF31jobIcXYeZETIlstNPKybOAKjA'


var cn=0,vegaReady=false;

function loadVega(){
  var libs=["vega.min.js","vega-lite.min.js","vega-embed.min.js"];
  var loaded=0;
  function next(){
    if(loaded>=libs.length){vegaReady=true;return;}
    var s=document.createElement('script');
    s.src=libs[loaded];
    s.onload=function(){loaded++;next();};
    s.onerror=function(){console.warn("Vega failed: "+libs[loaded]);loaded++;next();};
    document.head.appendChild(s);
  }
  next();
}
loadVega();

async function send(){
  var inp=document.getElementById('inp'),q=inp.value.trim();
  if(!q)return;
  addM(q,'u');inp.value='';
  document.getElementById('btn').disabled=true;
  document.getElementById('typ').style.display='block';sb();
  try{
    var r=await fetch(SF_URL+AG_PATH,{
      method:"POST",
      headers:{"Authorization":"Bearer "+PAT,"Content-Type":"application/json","Accept":"application/json"},
      body:JSON.stringify({messages:[{role:"user",content:[{type:"text",text:q}]}],stream:false})
    });
    if(!r.ok)throw new Error("API "+r.status+": "+(await r.text()));
    var data=await r.json();
    console.log("AGENT RAW:",data);
    render(data);
  }catch(e){addM('<p style="color:#d13438;">Error: '+esc(e.message)+'</p>','b');}
  document.getElementById('typ').style.display='none';
  document.getElementById('btn').disabled=false;sb();
}

function render(d){
  if(!d.content||!d.content.length){addM('<p>No response.</p>','b');return;}

  var vaqUsed=null;
  for(var i=0;i<d.content.length;i++){
    var it=d.content[i];
    if(it.type==='tool_result'&&it.tool_result&&it.tool_result.content){
      for(var j=0;j<it.tool_result.content.length;j++){
        var c=it.tool_result.content[j];
        if(c.type==='json'&&c.json&&c.json.verified_query_used!==undefined)vaqUsed=c.json.verified_query_used;
      }
    }
  }

  var h='',seenSQL={};
  for(var i=0;i<d.content.length;i++){
    var it=d.content[i];

    if(it.type==='text'&&!it.is_elicitation){
      h+=fmtMd(it.text);
    }
    else if(it.type==='table'&&it.table){
      if(it.table.title)h+='<div style="font-size:12px;font-weight:600;color:#1b1e2b;margin:8px 0 3px;">'+esc(it.table.title)+'</div>';
      if(it.table.result_set)h+=mkTbl(it.table.result_set);
    }
    else if(it.type==='chart'&&it.chart&&it.chart.chart_spec)h+=mkCh(it.chart.chart_spec);
    else if(it.type==='tool_result'&&it.tool_result){
      var tr=it.tool_result;
      if(tr.content){
        for(var j=0;j<tr.content.length;j++){
          var c=tr.content[j];
          if(c.type==='json'&&c.json){
            var sqlKey=c.json.sql||'';
            var isDup=false;
            if(sqlKey){
              var sqlNorm=sqlKey.replace(/\s+/g,' ').trim();
              if(seenSQL[sqlNorm]){isDup=true;}
              else seenSQL[sqlNorm]=true;
            }
            if(c.json.text)h+=fmtMd(c.json.text);
            if(!isDup){
              if(c.json.sql)h+=mkSql(c.json.sql,vaqUsed);
            }
          }else if(c.type==='text')h+=fmtMd(c.text);
        }
      }
    }
  }
  if(h)addM(h,'b');
}

function mkTbl(rs){
  if(!rs||!rs.data||!rs.data.length)return'<p style="color:#999;font-style:italic;">No data.</p>';
  var cols=[],types=[];
  if(rs.resultSetMetaData&&rs.resultSetMetaData.rowType){
    for(var i=0;i<rs.resultSetMetaData.rowType.length;i++){cols.push(rs.resultSetMetaData.rowType[i].name);types.push((rs.resultSetMetaData.rowType[i].type||'').toUpperCase());}
  }else{for(var i=0;i<rs.data[0].length;i++){cols.push('Col '+(i+1));types.push('');}}
  var nt=['NUMBER','DECIMAL','NUMERIC','INT','INTEGER','BIGINT','SMALLINT','TINYINT','FLOAT','DOUBLE','REAL','FIXED'];
  var t='<div class="tw"><table><thead><tr>';
  for(var i=0;i<cols.length;i++)t+='<th'+(nt.indexOf(types[i])>-1?' class="rn"':'')+'>' +esc(cols[i].replace(/_/g,' '))+'</th>';
  t+='</tr></thead><tbody>';
  for(var r=0;r<rs.data.length;r++){
    t+='<tr>';
    for(var c=0;c<rs.data[r].length;c++){
      var v=rs.data[r][c],isN=nt.indexOf(types[c])>-1;
      if(v===null||v===undefined){t+='<td class="nl">\u2014</td>';}
      else{var s=String(v),num=Number(s);
        if(isN||(!isNaN(num)&&s!==''&&s.indexOf(' ')===-1&&s.length<15)){
          t+='<td class="rn">'+(s.indexOf('.')>-1?parseFloat(num.toFixed(2)).toLocaleString():num.toLocaleString())+'</td>';
        }else t+='<td>'+esc(s)+'</td>';}
    }
    t+='</tr>';
  }
  t+='</tbody></table></div>';
  if(rs.resultSetMetaData&&rs.resultSetMetaData.numRows)t+='<div class="rc">'+Number(rs.resultSetMetaData.numRows).toLocaleString()+' rows</div>';
  return t;
}

function mkCh(spec){
  var id='ch-'+(++cn);
  if(!vegaReady)return'<div class="cb" style="padding:10px;color:#999;font-size:11px;">Chart (Vega not loaded)</div>';
  function tryRender(attempts){
    var el=document.getElementById(id);
    if(!el){if(attempts<20)setTimeout(function(){tryRender(attempts+1);},200);return;}
    try{
      var s=typeof spec==='string'?JSON.parse(spec):spec;
      if(!s.height)s.height=300;
      if(!s.width)s.width=500;
      vegaEmbed('#'+id,s,{actions:false,renderer:'canvas'}).catch(function(e){
        el.innerHTML='<p style="color:#d13438;padding:8px;font-size:11px;">Chart error: '+e.message+'</p>';
      });
    }catch(e){el.innerHTML='<p style="color:#d13438;padding:8px;font-size:11px;">Invalid chart spec</p>';}
  }
  setTimeout(function(){tryRender(0);},200);
  return'<div class="cb"><div id="'+id+'" style="min-height:320px;"></div></div>';
}

function mkSql(sql,vaq){
  var id='sq-'+Date.now()+Math.random().toString(36).substr(2,4);
  var h='<div class="sql-row">';
  h+='<div class="sqt" onclick="var b=document.getElementById(\''+id+'\'),a=this.querySelector(\'.ar\');b.classList.toggle(\'v\');a.classList.toggle(\'op\')"><span class="ar">&#9654;</span> SQL</div>';
  if(vaq===true)h+='<span class="vaq-badge">&#10003; Verified</span>';
  h+='</div>';
  h+='<div class="sqb" id="'+id+'">'+esc(sql)+'</div>';
  return h;
}

function fmtMd(text){
  if(!text)return'';
  var lines=text.split('\n'),html='',inL=false,i=0;
  while(i<lines.length){
    var ln=lines[i],tr=ln.trim();
    if(tr.charAt(0)==='|'&&tr.charAt(tr.length-1)==='|'&&tr.split('|').length>=3){
      if(inL){html+='</ul>';inL=false;}
      var res=pMdT(lines,i);
      if(res.h){html+=res.h;i=res.e;continue;}
    }
    if(/^#{1,3}\s+/.test(tr)){
      if(inL){html+='</ul>';inL=false;}
      var ht=tr.replace(/^#{1,3}\s+/,'');
      html+=(/^#[^#]/.test(tr)?'<div class="sh">':'<div class="subh">')+inF(ht)+'</div>';
    }else if(/^\s*[-*]\s+/.test(ln)){
      if(!inL){html+='<ul>';inL=true;}
      html+='<li>'+inF(ln.replace(/^\s*[-*]\s+/,''))+'</li>';
    }else if(/^\s*\d+\.\s+/.test(ln)){
      if(!inL){html+='<ul>';inL=true;}
      html+='<li>'+inF(ln.replace(/^\s*\d+\.\s+/,''))+'</li>';
    }else if(tr===''){
      if(inL){html+='</ul>';inL=false;}
    }else{
      if(inL){html+='</ul>';inL=false;}
      if(tr.length>150)html+='<div class="sb">'+inF(tr)+'</div>';
      else html+='<p>'+inF(tr)+'</p>';
    }
    i++;
  }
  if(inL)html+='</ul>';
  return html;
}

function pMdT(lines,si){
  var rows=[],idx=si;
  while(idx<lines.length){
    var t=lines[idx].trim();
    if(!(t.charAt(0)==='|'&&t.charAt(t.length-1)==='|'&&t.split('|').length>=3))break;
    if(!/^\|[\s\-:|]+\|$/.test(t)){
      var cells=t.split('|');cells=cells.slice(1,cells.length-1);
      for(var c=0;c<cells.length;c++)cells[c]=cells[c].trim();
      rows.push(cells);
    }
    idx++;
  }
  if(rows.length<2)return{h:'',e:si};

  var numCols={};
  for(var c=0;c<rows[0].length;c++){
    var allNum=true;
    for(var r=1;r<rows.length;r++){
      if(rows[r]&&rows[r][c]){
        var tv=rows[r][c].replace(/,/g,'').replace(/%/g,'').trim();
        if(tv&&tv!=='\u2014'&&isNaN(Number(tv))){allNum=false;break;}
      }
    }
    numCols[c]=allNum;
  }

  var h='<div class="tw"><table><thead><tr>';
  for(var c=0;c<rows[0].length;c++){
    h+='<th'+(numCols[c]?' class="rn"':'')+'>' +inF(rows[0][c])+'</th>';
  }
  h+='</tr></thead><tbody>';
  for(var r=1;r<rows.length;r++){
    h+='<tr>';
    for(var c=0;c<rows[0].length;c++){
      var v=(rows[r]&&rows[r][c]!==undefined)?rows[r][c]:'';
      if(!v||v==='\u2014')h+='<td class="nl">\u2014</td>';
      else if(numCols[c])h+='<td class="rn">'+inF(v)+'</td>';
      else h+='<td>'+inF(v)+'</td>';
    }
    h+='</tr>';
  }
  h+='</tbody></table></div>';
  return{h:h,e:idx};
}

function inF(s){
  var h=esc(s);
  h=h.replace(/\*\*\*(.*?)\*\*\*/g,'<strong><em>$1</em></strong>');
  h=h.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\*(.*?)\*/g,'<em>$1</em>');
  h=h.replace(/`(.*?)`/g,'<code>$1</code>');
  return h;
}

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}

function addM(c,t){
  var ca=document.getElementById('chat'),ty=document.getElementById('typ');
  var d=document.createElement('div');
  d.className='msg msg-'+t;
  d.innerHTML='<div class="bbl">'+(t==='u'?esc(c):c)+'</div>';
  ca.insertBefore(d,ty);sb();
}
function sb(){var c=document.getElementById('chat');c.scrollTop=c.scrollHeight;}
</script>
</body>
</html>
